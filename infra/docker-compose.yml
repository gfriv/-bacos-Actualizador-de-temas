services:
  postgres:
    build:
      context: ..
      dockerfile: infra/docker/postgres.Dockerfile
    environment:
      POSTGRES_USER: abacos
      POSTGRES_PASSWORD: abacos
      POSTGRES_DB: abacos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abacos -d abacos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      UPLOAD_DIR: /app/storage/uploads
      GENERATED_DIR: /app/storage/generated
    ports:
      - "8000:8000"
    volumes:
      - ../storage:/app/storage

  worker:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    command: ["python", "/app/workers/worker.py"]
    env_file:
      - ../.env.example
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      RUN_ALEMBIC_MIGRATIONS: "false"
      UPLOAD_DIR: /app/storage/uploads
      GENERATED_DIR: /app/storage/generated
    volumes:
      - ../storage:/app/storage

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:
