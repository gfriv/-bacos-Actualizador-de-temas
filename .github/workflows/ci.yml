name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Install backend dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check
      - name: Alembic heads
        run: uv run alembic heads | tee /tmp/alembic-heads.txt && test "$(wc -l < /tmp/alembic-heads.txt)" -eq 1
      - name: Alembic upgrade on SQLite smoke DB
        run: |
          rm -f ci-migrations.db
          DATABASE_URL=sqlite:///./ci-migrations.db uv run alembic upgrade head
      - name: Pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Enable Corepack
        run: corepack enable
      - name: Install frontend dependencies
        run: corepack pnpm --dir apps/web install --frozen-lockfile
      - name: Lint
        run: corepack pnpm lint:web
      - name: Typecheck
        run: corepack pnpm typecheck:web
      - name: Tests
        run: corepack pnpm test:web
      - name: Build
        run: corepack pnpm build:web

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compose config
        run: docker compose -p abacos-ci -f infra/docker-compose.yml config --quiet
      - name: Compose build
        run: docker compose -p abacos-ci -f infra/docker-compose.yml build api worker web
      - name: Start backend stack
        run: docker compose -p abacos-ci -f infra/docker-compose.yml up -d postgres redis api worker
      - name: API healthcheck
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/health | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 2
          done
          docker compose -p abacos-ci -f infra/docker-compose.yml logs api worker
          exit 1
      - name: Cleanup
        if: always()
        run: docker compose -p abacos-ci -f infra/docker-compose.yml down -v --remove-orphans
